name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS library dependencies
        run: bun install --cwd js

      - name: Run tests
        run: bun test
        working-directory: js

      - name: Type check
        run: bun run type-check
        working-directory: js
