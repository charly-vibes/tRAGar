name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install JS library dependencies
        run: bun install --cwd js

      - name: Build JS bundle
        run: bun build js/tragar.ts --outdir dist/js --target browser --format esm --external @xenova/transformers

      - name: Build API docs (TypeDoc)
        run: bun run --cwd js docs

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r examples _site/
          cp -r dist _site/
          cp -r docs _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
